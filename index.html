<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Andy ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <style>
        :root {
            --white: #ffffff;
            --cream: #fffaf7;
            --blush: #fde8ee;
            --blush-strong: #f8bfd0;
            --rose: #d94b7d;
            --wine: #8a1047;
            --wine-dark: #4f0829;
            --ink: #221820;
            --muted: #765d68;
            --soft-line: rgba(138, 16, 71, 0.14);
            --shadow: rgba(95, 13, 49, 0.18);
            --gold: #d7b46a;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 16% 18%, rgba(248, 191, 208, 0.55), transparent 30%),
                radial-gradient(circle at 84% 10%, rgba(255, 255, 255, 0.85), transparent 28%),
                radial-gradient(circle at 78% 82%, rgba(138, 16, 71, 0.12), transparent 33%),
                linear-gradient(145deg, var(--cream) 0%, var(--blush) 54%, #fff 100%);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.35;
            background-image:
                linear-gradient(rgba(138, 16, 71, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(138, 16, 71, 0.05) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(circle at center, black, transparent 70%);
        }

        button {
            font: inherit;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(62px);
            opacity: 0.45;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .orb-one {
            width: 330px;
            height: 330px;
            left: -110px;
            top: 5vh;
            background: var(--blush-strong);
        }

        .orb-two {
            width: 290px;
            height: 290px;
            right: -90px;
            bottom: 2vh;
            background: rgba(138, 16, 71, 0.24);
            animation-delay: -6s;
        }

        .orb-three {
            width: 220px;
            height: 220px;
            left: 55%;
            top: 18%;
            background: rgba(255, 255, 255, 0.9);
            animation-delay: -11s;
        }

        @keyframes drift {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(34px, -28px, 0) scale(1.08); }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            opacity: 0;
            color: rgba(138, 16, 71, 0.34);
            animation: rise 12s ease-in-out infinite;
        }

        .particle.dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(138, 16, 71, 0.22);
            box-shadow: 0 0 14px rgba(217, 75, 125, 0.25);
        }

        @keyframes rise {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
            12% { opacity: 0.72; }
            75% { opacity: 0.35; }
            100% { transform: translate3d(var(--x-drift), -112vh, 0) rotate(220deg); opacity: 0; }
        }

        .floating-dust {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .dust {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(215, 180, 106, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(215, 180, 106, 0.2);
            opacity: 0;
            animation: floatDust 12s ease-in-out infinite;
        }

        .dust:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; animation-duration: 10s; }
        .dust:nth-child(2) { left: 75%; top: 30%; animation-delay: 2s; animation-duration: 11s; }
        .dust:nth-child(3) { left: 45%; top: 15%; animation-delay: 4s; animation-duration: 9s; }
        .dust:nth-child(4) { left: 85%; top: 60%; animation-delay: 6s; animation-duration: 12s; }
        .dust:nth-child(5) { left: 25%; top: 75%; animation-delay: 1s; animation-duration: 10.5s; }
        .dust:nth-child(6) { left: 65%; top: 80%; animation-delay: 3s; animation-duration: 11.5s; }
        .dust:nth-child(7) { left: 35%; top: 45%; animation-delay: 5s; animation-duration: 9.5s; }
        .dust:nth-child(8) { left: 55%; top: 65%; animation-delay: 7s; animation-duration: 10s; }

        @keyframes floatDust {
            0%, 100% { opacity: 0; transform: translate3d(0, 0, 0) scale(0.8); }
            10% { opacity: 0.4; transform: translate3d(20px, -20px, 0) scale(1); }
            30% { opacity: 0.3; transform: translate3d(-15px, -40px, 0) scale(0.9); }
            50% { opacity: 0.5; transform: translate3d(10px, -60px, 0) scale(1.1); }
            70% { opacity: 0.3; transform: translate3d(-10px, -80px, 0) scale(0.95); }
            90% { opacity: 0.2; transform: translate3d(5px, -100px, 0) scale(0.8); }
        }

        .stage {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1rem, 4vw, 2rem);
            position: relative;
            z-index: 2;
        }

        .proposal-card {
            width: min(100%, 500px);
            position: relative;
            padding: clamp(1.35rem, 3vw, 1.75rem);
            border-radius: 34px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(255, 250, 247, 0.64));
            border: 1px solid rgba(255, 255, 255, 0.74);
            box-shadow: 0 34px 90px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            opacity: 0;
            transform: translateY(30px) scale(0.96);
            transition: transform 0.5s ease, box-shadow 0.5s ease, background 0.5s ease;
        }

        .proposal-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 40px 120px rgba(95, 13, 49, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 250, 247, 0.74));
        }

        .proposal-card::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 26px;
            border: 1px solid rgba(138, 16, 71, 0.10);
            pointer-events: none;
        }

        .proposal-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 34px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(215, 180, 106, 0.38), rgba(248, 191, 208, 0.35), rgba(255, 255, 255, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-inner {
            position: relative;
            padding: clamp(2rem, 5vw, 3rem) clamp(1.25rem, 4vw, 2.25rem);
            border-radius: 24px;
            text-align: center;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.75), transparent 42%),
                rgba(255, 255, 255, 0.46);
            overflow: hidden;
        }

        .card-inner::before {
            content: '';
            position: absolute;
            inset: auto -10% 0 -10%;
            height: 92px;
            background: url("data:image/svg+xml,%3Csvg width='640' height='90' viewBox='0 0 640 90' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 45H120L135 45L145 24L157 66L169 18L184 45H300L316 45L326 24L338 66L350 18L365 45H500L516 45L526 24L538 66L550 18L565 45H640' stroke='%238A1047' stroke-opacity='.16' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/cover no-repeat;
            opacity: 0.75;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }

        .card-inner::after {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(138,16,71,0.35), transparent);
            animation: pulse 2.2s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scaleX(0.9); }
            50% { opacity: 1; transform: scaleX(1); }
        }

        .medical-mark {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            margin: 0 auto 1.15rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--soft-line);
            box-shadow: 0 10px 28px rgba(138, 16, 71, 0.08);
            position: relative;
            overflow: hidden;
        }

        .medical-mark::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(217, 75, 125, 0.15), transparent 50%);
            opacity: 0;
            animation: pulseMark 2.2s ease-in-out infinite;
        }

        @keyframes pulseMark {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .medical-mark svg {
            width: 26px;
            height: 26px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 0.8rem;
            padding: 0.48rem 0.85rem;
            border: 1px solid var(--soft-line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.68);
            color: var(--wine);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.25rem, 12vw, 5rem);
            line-height: 0.95;
            font-weight: 600;
            color: var(--wine);
            letter-spacing: -0.045em;
            text-wrap: balance;
        }

        .heart-beat {
            display: inline-block;
            filter: drop-shadow(0 10px 18px rgba(138, 16, 71, 0.22));
            animation: heartbeat 1.8s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            28% { transform: scale(1.17); }
            42% { transform: scale(0.96); }
            56% { transform: scale(1.1); }
        }

        .subtitle {
            margin-top: 0.9rem;
            font-family: 'Cormorant Garamond', serif;
            color: var(--muted);
            font-size: clamp(1.05rem, 4vw, 1.28rem);
            font-style: italic;
        }

        .divider {
            width: min(72%, 260px);
            height: 1px;
            margin: 1.55rem auto;
            background: linear-gradient(90deg, transparent, rgba(138, 16, 71, 0.25), transparent);
            position: relative;
        }

        .divider::before {
            content: '';
            width: 8px;
            height: 8px;
            border: 1px solid rgba(138, 16, 71, 0.28);
            background: var(--cream);
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .question {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 7vw, 2.8rem);
            line-height: 1.04;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: -0.025em;
            text-wrap: balance;
        }

        .question span {
            color: var(--wine);
        }

        .hint {
            margin: 1rem auto 0;
            max-width: 29ch;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.65;
        }

        .actions {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 0.74fr;
            gap: 1rem;
            align-items: center;
            margin-top: 2.15rem;
        }

        .btn {
            min-height: 58px;
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            position: relative;
            isolation: isolate;
            transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease, border-color 220ms ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:focus-visible {
            outline: 3px solid rgba(138, 16, 71, 0.28);
            outline-offset: 4px;
        }

        .yes-btn {
            overflow: hidden;
            color: var(--white);
            background: linear-gradient(135deg, #c82f67 0%, var(--wine) 48%, var(--wine-dark) 100%);
            box-shadow: 0 18px 34px rgba(138, 16, 71, 0.35), 0 0 0 8px rgba(248, 191, 208, 0.2);
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.24);
        }

        .yes-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.24), transparent);
            transform: translateX(-115%);
            animation: buttonShine 2.9s ease-in-out infinite;
        }

        .yes-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 24px 46px rgba(138, 16, 71, 0.42), 0 0 0 10px rgba(248, 191, 208, 0.18);
        }

        @keyframes buttonShine {
            0%, 45% { transform: translateX(-115%); }
            78%, 100% { transform: translateX(115%); }
        }

        .no-btn {
            color: var(--wine);
            background: rgba(255, 255, 255, 0.88);
            border: 1.5px solid rgba(138, 16, 71, 0.24);
            box-shadow: 0 10px 22px rgba(138, 16, 71, 0.08);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .no-btn:hover {
            transform: translateY(-2px);
            background: var(--white);
            border-color: rgba(138, 16, 71, 0.38);
            box-shadow: 0 14px 26px rgba(138, 16, 71, 0.12);
        }

        .celebration {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            place-items: center;
            padding: 1.5rem;
            background: rgba(255, 250, 247, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .celebration-panel {
            width: min(100%, 420px);
            padding: 2.25rem;
            border-radius: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(138, 16, 71, 0.12);
            box-shadow: 0 28px 70px rgba(138, 16, 71, 0.18);
        }

        .celebration-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .celebration-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 7vw, 2.85rem);
            color: var(--wine);
            line-height: 1;
            margin-bottom: 0.75rem;
        }

        .celebration-text {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 21;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -24px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to { transform: translateY(112vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 520px) {
            body {
                overflow-y: auto;
            }

            .stage {
                min-height: 100svh;
                padding: 1rem;
            }

            .proposal-card {
                border-radius: 28px;
            }

            .actions {
                grid-template-columns: 1fr;
                gap: 0.85rem;
            }

            .yes-btn,
            .no-btn {
                width: 100%;
            }

            .no-btn {
                min-height: 50px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb orb-one"></div>
        <div class="orb orb-two"></div>
        <div class="orb orb-three"></div>
    </div>

    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="floating-dust" aria-hidden="true">
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
        <span class="dust"></span>
    </div>

    <main class="stage">
        <section class="proposal-card" id="proposalCard" aria-labelledby="proposalTitle">
            <div class="card-inner">
                <div class="medical-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 5v22M5 16h22" stroke="#8A1047" stroke-width="2.4" stroke-linecap="round"/>
                        <path d="M7 23c3.2-4.8 6.3-7.2 9-7.2 2.9 0 5.5 2.2 9 7.2" stroke="#D94B7D" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
                    </svg>
                </div>

                <p class="eyebrow">Invitación privada</p>

                <h1 class="name" id="proposalTitle">Andy <span class="heart-beat">❤️</span></h1>
                <p class="subtitle">Mi mandona más hermosa ✨</p>

                <div class="divider" aria-hidden="true"></div>

                <h2 class="question">¿Quieres ser mi <span>novia</span>? 💝</h2>
                <p class="hint">Prometo cuidar tu corazón con más atención que una guardia importante.</p>

                <div class="actions" aria-label="Opciones de respuesta">
                    <button class="btn yes-btn" id="yesBtn" type="button" aria-label="Sí, quiero ser tu novia">¡Sí! 💖</button>
                    <button class="btn no-btn" id="noBtn" type="button" aria-label="No, respuesta secundaria">No 💔</button>
                </div>
            </div>
        </section>
    </main>

    <div class="celebration" id="celebration" role="dialog" aria-modal="true" aria-labelledby="celebrationTitle">
        <div class="celebration-panel">
            <div class="celebration-icon" aria-hidden="true">💕</div>
            <h2 class="celebration-title" id="celebrationTitle">Mi doctora favorita</h2>
            <p class="celebration-text">Ahora tienes una misión preciosa: cuidar este corazón que ya era tuyo. ❤️‍🩹</p>
        </div>
    </div>

    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <script>
        (function () {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const proposalCard = document.getElementById('proposalCard');
            const particles = document.getElementById('particles');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const celebration = document.getElementById('celebration');
            const confetti = document.getElementById('confetti');

            const particleGlyphs = ['♡', '•', '✧'];
            const noTexts = ['No 💔', '¿Segura? 🥺', 'Piénsalo bien', 'Te escapaste 😏'];
            let noIndex = 0;

            function createParticle() {
                const particle = document.createElement('span');
                const isDot = Math.random() > 0.55;
                particle.className = isDot ? 'particle dot' : 'particle';
                if (!isDot) particle.textContent = particleGlyphs[Math.floor(Math.random() * particleGlyphs.length)];
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.setProperty('--x-drift', `${Math.random() * 90 - 45}px`);
                particle.style.animationDuration = `${Math.random() * 8 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 8}s`;
                particle.style.fontSize = `${Math.random() * 0.5 + 0.55}rem`;
                particles.appendChild(particle);
                setTimeout(() => particle.remove(), 19000);
            }

            function initParticles() {
                if (prefersReducedMotion) return;
                for (let i = 0; i < 22; i += 1) setTimeout(createParticle, i * 260);
                setInterval(createParticle, 700);
            }

            function animateIntro() {
                if (prefersReducedMotion || !window.gsap) {
                    proposalCard.style.opacity = '1';
                    proposalCard.style.transform = 'none';
                    return;
                }

                gsap.timeline({ defaults: { ease: 'power3.out' } })
                    .to(proposalCard, { opacity: 1, y: 0, scale: 1, duration: 1.05 })
                    .fromTo('.medical-mark', { opacity: 0, y: 12, scale: 0.86 }, { opacity: 1, y: 0, scale: 1, duration: 0.55 }, '-=0.62')
                    .fromTo('.eyebrow', { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 }, '-=0.38')
                    .fromTo('.name, .subtitle, .divider, .question, .hint', { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.7, stagger: 0.09 }, '-=0.15')
                    .fromTo('.btn', { opacity: 0, y: 16, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, stagger: 0.1, ease: 'back.out(1.5)' }, '-=0.2');
            }

            function moveNoButton() {
                if (prefersReducedMotion || !window.gsap) return;

                const rect = noBtn.getBoundingClientRect();
                const margin = 20;
                const x = margin + Math.random() * (window.innerWidth - rect.width - margin * 2);
                const y = margin + Math.random() * (window.innerHeight - rect.height - margin * 2);

                noIndex = Math.min(noIndex + 1, noTexts.length - 1);
                noBtn.textContent = noTexts[noIndex];

                gsap.timeline()
                    .to(noBtn, { x: '+=8', duration: 0.05, yoyo: true, repeat: 4 })
                    .to(noBtn, {
                        x: x - rect.left,
                        y: y - rect.top,
                        duration: 0.38,
                        ease: 'power2.out'
                    });
            }

            function spawnConfetti() {
                const pieces = ['❤️', '💖', '💕', '♡'];
                const colors = ['#8a1047', '#d94b7d', '#f8bfd0', '#d7b46a'];

                for (let i = 0; i < 72; i += 1) {
                    const piece = document.createElement('span');
                    piece.className = 'confetti-piece';
                    if (Math.random() > 0.55) {
                        piece.textContent = pieces[Math.floor(Math.random() * pieces.length)];
                        piece.style.fontSize = `${Math.random() * 0.9 + 0.75}rem`;
                    } else {
                        const size = Math.random() * 8 + 5;
                        piece.style.width = `${size}px`;
                        piece.style.height = `${size}px`;
                        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    }
                    piece.style.left = `${Math.random() * 100}%`;
                    piece.style.animationDuration = `${Math.random() * 1.8 + 2.4}s`;
                    piece.style.animationDelay = `${i * 20}ms`;
                    confetti.appendChild(piece);
                    setTimeout(() => piece.remove(), 5200);
                }
            }

            function celebrate() {
                celebration.style.display = 'grid';
                spawnConfetti();

                if (window.gsap && !prefersReducedMotion) {
                    gsap.fromTo('.celebration-panel', { opacity: 0, y: 24, scale: 0.88 }, { opacity: 1, y: 0, scale: 1, duration: 0.75, ease: 'back.out(1.5)' });
                    gsap.fromTo('.celebration-icon', { scale: 0, rotate: -80 }, { scale: 1, rotate: 0, duration: 0.9, delay: 0.18, ease: 'elastic.out(1, 0.55)' });
                }

                setTimeout(() => {
                    window.location.href = 'https://www.youtube.com/watch?v=is_iOZeHTfU';
                }, 4500);
            }

            yesBtn.addEventListener('click', celebrate);
            noBtn.addEventListener('mouseenter', moveNoButton);
            noBtn.addEventListener('click', moveNoButton);
            noBtn.addEventListener('touchstart', moveNoButton, { passive: true });

            initParticles();
            animateIntro();
        })();
    </script>
</body>
</html>
